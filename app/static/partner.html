<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>同城配送经营分析系统 - 城市经营</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/">全国总览</a>
      <a class="nav-link active" href="/partner">城市经营</a>
      <a class="nav-link" href="/partner/hourly">时段热力与履约</a>
      <a class="nav-link" href="/partner/entities">主体分析</a>
      <a class="nav-link" href="/alerts">诊断预警</a>
    </nav>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        try {
          const data = JSON.parse(sessionStorage.getItem("dashboard_filters") || "{}");
          const partnerId = data._shared_partner_id;
          const startDate = data._shared_start_date;
          const endDate = data._shared_end_date;
          document.querySelectorAll(".top-nav .nav-link").forEach((link) => {
            if (!link.getAttribute("href").startsWith("/partner")) return;
            const url = new URL(link.href, window.location.origin);
            if (partnerId) url.searchParams.set("partner_id", partnerId);
            if (startDate) url.searchParams.set("start_date", startDate);
            if (endDate) url.searchParams.set("end_date", endDate);
            link.href = url.pathname + url.search;
          });
        } catch (_) {}
      });
    </script>

    <header class="page-header">
      <div class="page-header-main">
        <p class="page-tag">城市经营首页</p>
        <h1>城市经营</h1>
        <p class="page-desc">保留经营摘要、经营收益、直营专项摘要和问题摘要入口，细分专题请进入时段热力与履约页或主体分析页。</p>
        <p class="page-mission">页面使命：看单城市经营结果与收入质量，判断是否需要深入下钻。</p>
      </div>
      <div class="page-meta-grid">
        <div class="meta-card"><span>最后导入时间</span><strong id="partnerlastImportTime">-</strong></div>
        <div class="meta-card"><span>最新数据日期</span><strong id="partnerlatestDataDate">-</strong></div>
        <div class="meta-card"><span>数据版本</span><strong id="partnerdataVersion">-</strong></div>
      </div>
    </header>

    <section class="toolbar report-section">
      <div class="toolbar-head">
        <div>
          <h2>筛选条件</h2>
          <p>请选择日期范围和合伙人。当前页面用于查看经营全貌与直营专项摘要。</p>
        </div>
        <button id="refreshPartner" class="btn">刷新数据</button>
      </div>
      <div id="partnerFilterSummary" class="filter-summary"></div>
      <div class="toolbar-grid">
        <label class="field"><span>开始日期</span><input id="partnerStartDate" type="date"></label>
        <label class="field"><span>结束日期</span><input id="partnerEndDate" type="date"></label>
        <label class="field field-wide"><span>合伙人</span><div id="partnerSelectControl"></div></label>
      </div>
      <button id="partnerFilterToggle" class="filter-toggle">更多筛选</button>
      <div id="partnerFilterMore" class="filter-more">
        <label class="field"><span>活跃完成单阈值</span><input id="partnerActiveThreshold" type="number" min="1" value="1"></label>
        <label class="field"><span>有效取消阈值（分钟）</span><input id="validCancelThreshold" type="number" min="1" value="5"></label>
      </div>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">经营摘要</p><h2>城市经营摘要</h2></div></div>
      <div id="partnerConclusion" class="tags"></div>
      <div id="partnerCards" class="cards summary-strip">
        <div class="kpi-tier kpi-tier-result"><span class="kpi-tier-label">结果指标</span></div>
        <div class="kpi-tier kpi-tier-process"><span class="kpi-tier-label">过程指标</span></div>
        <div class="kpi-tier kpi-tier-action"><span class="kpi-tier-label">动作指标</span></div>
      </div>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">经营趋势</p><h2>经营趋势</h2></div></div>
      <article class="report-card"><div id="partnerDailyChart" class="chart tall"></div></article>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">经营收益</p><h2>经营收益</h2></div></div>
      <article class="report-card"><div id="partnerFinanceChart" class="chart"></div></article>
      <article class="report-card"><div id="partnerFinanceTable" class="table-wrap"></div></article>
    </section>

    <section id="directSpecialSection" class="report-section">
      <div class="section-head"><div><p class="section-kicker">直营专项</p><h2>直营专项摘要</h2></div></div>
      <div id="directSpecialTags" class="tags"></div>
      <div id="directSpecialCards" class="cards summary-strip">
        <div class="kpi-tier kpi-tier-result"><span class="kpi-tier-label">结果指标</span></div>
        <div class="kpi-tier kpi-tier-process"><span class="kpi-tier-label">过程指标</span></div>
      </div>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">问题摘要</p><h2>问题摘要入口</h2></div></div>
      <div id="issueSummaryTags" class="tags"></div>
      <div id="partnerDrillLinks" class="drill-links"></div>
    </section>
  </div>

  <script type="module" src="/static/partner.js"></script>
</body>
</html>
