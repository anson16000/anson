<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>同城配送经营分析系统 - 时段热力与履约</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <nav class="top-nav">
      <a class="nav-link" href="/">全国总览</a>
      <a class="nav-link" href="/partner">城市经营</a>
      <a class="nav-link active" href="/partner/hourly">时段热力与履约</a>
      <a class="nav-link" href="/partner/entities">主体分析</a>
      <a class="nav-link" href="/alerts">诊断预警</a>
    </nav>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        try {
          const data = JSON.parse(sessionStorage.getItem("dashboard_filters") || "{}");
          const pid = data._shared_partner_id;
          const sd = data._shared_start_date;
          const ed = data._shared_end_date;
          document.querySelectorAll(".top-nav .nav-link").forEach((a) => {
            if (a.getAttribute("href").startsWith("/partner")) {
              const url = new URL(a.href, window.location.origin);
              if (pid) url.searchParams.set("partner_id", pid);
              if (sd) url.searchParams.set("start_date", sd);
              if (ed) url.searchParams.set("end_date", ed);
              a.href = url.pathname + url.search;
            }
          });
        } catch (_) {}
      });
    </script>

    <header class="page-header">
      <div class="page-header-main">
        <p class="page-tag">时段承接与履约专题</p>
        <h1>时段热力与履约</h1>
        <p class="page-desc">专门看小时运力、热力图、准时率和 SLA 履约情况，帮助定位高峰问题和履约异常。</p>
        <p class="page-mission">页面使命：看供需错配集中在哪些时段/日期</p>
      </div>
      <div class="page-meta-grid">
        <div class="meta-card"><span>最后导入时间</span><strong id="hourlylastImportTime">-</strong></div>
        <div class="meta-card"><span>最新数据日期</span><strong id="hourlylatestDataDate">-</strong></div>
        <div class="meta-card"><span>数据版本</span><strong id="hourlydataVersion">-</strong></div>
      </div>
    </header>

    <section class="toolbar report-section">
      <div class="toolbar-head">
        <div>
          <h2>筛选条件</h2>
          <p>请选择日期范围和合伙人，时段页聚焦运力承接、准时率与 SLA 表现。</p>
        </div>
        <button id="refreshHourly" class="btn">刷新数据</button>
      </div>
      <div id="hourlyFilterSummary" class="filter-summary"></div>
      <div class="toolbar-grid">
        <label class="field"><span>开始日期</span><input id="hourlyStartDate" type="date"></label>
        <label class="field"><span>结束日期</span><input id="hourlyEndDate" type="date"></label>
        <label class="field field-wide"><span>合伙人</span><div id="hourlyPartnerControl"></div></label>
      </div>
      <button id="hourlyFilterToggle" class="filter-toggle">更多筛选</button>
      <div id="hourlyFilterMore" class="filter-more">
        <label class="field"><span>有效取消阈值（分钟）</span><input id="hourlyValidCancelThreshold" type="number" min="1" value="5"></label>
      </div>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">时段结论</p><h2>时段结论</h2></div></div>
      <div id="hourlyConclusion" class="tags"></div>
      <div id="hourlyDrillLinks" class="drill-links"></div>
      <div id="hourlyCards" class="cards summary-strip">
        <div class="kpi-tier kpi-tier-result"><span class="kpi-tier-label">结果指标</span></div>
        <div class="kpi-tier kpi-tier-process"><span class="kpi-tier-label">过程指标</span></div>
      </div>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">小时运力</p><h2>小时运力</h2></div></div>
      <article class="report-card"><div id="hourlyAcceptedChart" class="chart tall"></div></article>
      <article class="report-card"><div id="hourlyTable" class="table-wrap"></div></article>
    </section>

    <section class="report-section">
      <div class="section-head"><div><p class="section-kicker">热力图</p><h2>热力图</h2></div></div>
      <div class="heatmap-tabs">
        <button class="tab-btn active" data-tab="completed">完成订单热力图</button>
        <button class="tab-btn" data-tab="cancelled">取消订单热力图</button>
        <button class="tab-btn" data-tab="cancelRate">取消率热力图</button>
      </div>
      <div class="tab-panels">
        <article class="report-card tab-panel active" data-tab="completed">
          <div id="hourlyCompletedHeatmap"></div>
        </article>
        <article class="report-card tab-panel" data-tab="cancelled">
          <div id="hourlyCancelledHeatmap"></div>
        </article>
        <article class="report-card tab-panel" data-tab="cancelRate">
          <div id="hourlyCancelRateHeatmap"></div>
        </article>
      </div>
    </section>
  </div>

  <script type="module" src="/static/hourly.js"></script>
</body>
</html>
